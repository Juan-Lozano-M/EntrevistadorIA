spring:
  application:
    name: interviewai
  datasource:
    # DB_URL gana si está; si no, se arma desde piezas (Render las inyecta vía blueprint).
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:interviewai}}
    username: ${DB_USER:interviewai}
    password: ${DB_PASSWORD:interviewai}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-this-must-be-at-least-32-bytes-long}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  llm:
    openrouter:
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:nvidia/nemotron-3-super-120b-a12b:free}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  email:
    resend:
      api-key: ${RESEND_API_KEY:}
      from: ${EMAIL_FROM:InterviewAI <onboarding@resend.dev>}
    daily-cron: ${EMAIL_DAILY_CRON:0 0 18 * * *}
    weekly-cron: ${EMAIL_WEEKLY_CRON:0 0 9 * * MON}
  billing:
    mercadopago:
      access-token: ${MP_ACCESS_TOKEN:}
      public-key: ${MP_PUBLIC_KEY:}
      currency: ${MP_CURRENCY:MXN}
      amount: ${MP_AMOUNT:199}
      webhook-url: ${MP_WEBHOOK_URL:}
      back-url: ${MP_BACK_URL:}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
