spring:
  application:
    name: interviewai
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/interviewai}
    username: ${DB_USER:interviewai}
    password: ${DB_PASSWORD:interviewai}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-this-must-be-at-least-32-bytes-long}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
